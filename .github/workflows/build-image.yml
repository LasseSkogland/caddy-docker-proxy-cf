name: ci

on:
  push:
  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: write
  packages: write

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true # Reuses modules across runs

      - name: Install xcaddy
        run: go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest

      - name: Build Binaries
        run: |
          mkdir -p bin
          # Cross-compile for AMD64
          GOOS=linux GOARCH=amd64 xcaddy build \
            --with github.com/caddy-dns/cloudflare \
            --with github.com/lucaslorentz/caddy-docker-proxy/v2 \
            --output bin/caddy-linux-amd64
          # Cross-compile for ARM64
          GOOS=linux GOARCH=arm64 xcaddy build \
            --with github.com/caddy-dns/cloudflare \
            --with github.com/lucaslorentz/caddy-docker-proxy/v2 \
            --output bin/caddy-linux-arm64

      - name: Upload Binaries for next job
        uses: actions/upload-artifact@v7
        with:
          name: caddy-bins
          path: bin/
  docker:
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Binaries
        uses: actions/download-artifact@v8
        with:
          name: caddy-bins
          path: bin/
        
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          images: |
            ghcr.io/${{ github.repository }}
          flavor: |
            latest=true
          tags: |
            type=schedule,pattern={{date 'YYYYMMDD'}}
            type=ref,enable=true,event=branch
          labels: |
            org.opencontainers.image.vendor=LasseSkogland
            maintainer=Lasse Skogland <lasse.skogland@gmail.com>
            
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
