name: ci

on:
  push:
  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: write
  packages: write

jobs:
  check-versions:
    runs-on: ubuntu-latest
    outputs:
      needs_build: ${{ steps.check.outputs.needs_build }}
      caddy_version: ${{ steps.check.outputs.caddy_version }}
      go_version: ${{ steps.check.outputs.go_version }}
    steps:
      - uses: actions/checkout@v6

      - name: Check for new versions
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CADDY_VERSION=$(gh release view --repo caddyserver/caddy --json tagName -q '.tagName')
          GO_VERSION=$(curl -fsSL 'https://go.dev/dl/?mode=json' | jq -r '.[0].version' | sed 's/^go//')

          echo "caddy_version=$CADDY_VERSION" >> "$GITHUB_OUTPUT"
          echo "go_version=$GO_VERSION" >> "$GITHUB_OUTPUT"

          if [ -f .last-built-versions ]; then
            LAST_CADDY=$(grep '^caddy=' .last-built-versions | cut -d= -f2)
            LAST_GO=$(grep '^go=' .last-built-versions | cut -d= -f2)
          else
            LAST_CADDY=""
            LAST_GO=""
          fi

          if [ "$CADDY_VERSION" != "$LAST_CADDY" ] || [ "$GO_VERSION" != "$LAST_GO" ]; then
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
          fi

  build-binaries:
    runs-on: ubuntu-latest
    needs: check-versions
    if: github.event_name != 'schedule' || needs.check-versions.outputs.needs_build == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ needs.check-versions.outputs.go_version }}
          cache: true

      - name: Install xcaddy
        run: go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest

      - name: Build Binaries
        run: |
          mkdir -p bin
          # Cross-compile for AMD64
          GOOS=linux GOARCH=amd64 xcaddy build \
            --with github.com/caddy-dns/cloudflare \
            --with github.com/lucaslorentz/caddy-docker-proxy/v2 \
            --output bin/caddy-linux-amd64
          # Cross-compile for ARM64
          GOOS=linux GOARCH=arm64 xcaddy build \
            --with github.com/caddy-dns/cloudflare \
            --with github.com/lucaslorentz/caddy-docker-proxy/v2 \
            --output bin/caddy-linux-arm64

      - name: Upload Binaries for next job
        uses: actions/upload-artifact@v7
        with:
          name: caddy-bins
          path: bin/

  docker:
    runs-on: ubuntu-latest
    needs: [check-versions, build-binaries]
    if: github.event_name != 'schedule' || needs.check-versions.outputs.needs_build == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Binaries
        uses: actions/download-artifact@v8
        with:
          name: caddy-bins
          path: bin/

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          images: |
            ghcr.io/${{ github.repository }}
          flavor: |
            latest=true
          tags: |
            type=schedule,pattern={{date 'YYYYMMDD'}}
            type=ref,enable=true,event=branch
            type=raw,value=${{ needs.check-versions.outputs.caddy_version }}
          labels: |
            org.opencontainers.image.vendor=LasseSkogland
            maintainer=Lasse Skogland <lasse.skogland@gmail.com>

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update version tracking file
        run: |
          echo "caddy=${{ needs.check-versions.outputs.caddy_version }}" > .last-built-versions
          echo "go=${{ needs.check-versions.outputs.go_version }}" >> .last-built-versions
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last-built-versions
          git diff --cached --quiet || git commit -m "chore: update last built versions [skip ci]"
          git push
